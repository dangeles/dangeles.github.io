---
layout: default
---

<div class="page-wrap content-wrap">
  {% if page.title %}
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-subtitle muted">{{ page.subtitle }}</p>{% endif %}
  </header>
  <hr>
  {% endif %}
  <div class="page-content">
    {{ content }}
  </div>
</div>
