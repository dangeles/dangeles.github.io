<form class="contact-form" action="{{ site.data.settings.contact_settings.form_action }}" method="POST">
  <div class="form-row">
    <div class="form-group">
      <label for="first-name">First name</label>
      <input type="text" id="first-name" name="first_name" placeholder="First name" required>
    </div>
    <div class="form-group">
      <label for="last-name">Last name</label>
      <input type="text" id="last-name" name="last_name" placeholder="Last name" required>
    </div>
  </div>
  <div class="form-group">
    <label for="contact-email">Email</label>
    <input type="email" id="contact-email" name="_replyto" placeholder="your@email.com" required>
  </div>
  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="6" placeholder="Your message..." required></textarea>
  </div>
  <input type="hidden" name="_subject" value="{{ site.data.settings.contact_settings.email_subject }}">
  <input type="hidden" name="_next" value="{{ site.data.settings.contact_settings.confirmation_url | relative_url }}">
  <button type="submit" class="btn-submit">{{ site.data.settings.contact_settings.send_button_text }}</button>
</form>
