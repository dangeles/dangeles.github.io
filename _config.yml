title: "David Angeles-Albores, Ph.D."
description: "Executive & Founder Scientist at The Organogenesis and Tissue Replacement Lab. Computational biologist working at the intersection of ML/AI, single-cell genomics, and tissue replacement."
url: https://dangeles.github.io
baseurl: ""
lang: en

author:
  name: "David Angeles-Albores"
  url: "https://dangeles.github.io"

social:
  links:
    - https://github.com/dangeles
    - https://www.linkedin.com/in/dangelesgenetics

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /blog/:slug
    type: "post"

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

sass:
  sass_dir: _sass
  style: compressed
  sourcemap: never

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag

paginate: 20
paginate_path: "/writing/page:num/"

navigation:
  - text: "About"
    url: "/about"
  - text: "Research"
    url: "/research"
  - text: "Writing"
    url: "/writing"
  - text: "Contact"
    url: "/contact"
