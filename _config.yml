title: "David Angeles-Albores, Ph.D."
description: "Co-founder & CEO of Genesis. Computational geneticist building human organs through hardware, computation, and experimental biology."
url: https://dangeles.github.io
baseurl: ""
lang: en
google_site_verification: FC6L7deZUw5gh5OHcnS78o5sijL2wiRK6Q6RUr7leME

author:
  name: "David Angeles-Albores"
  url: "https://dangeles.github.io"

social:
  image: /assets/img/faces/david.jpeg
  links:
    - https://github.com/dangeles
    - https://www.linkedin.com/in/exolivers

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /blog/:slug
    type: "post"

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

sass:
  sass_dir: _sass
  style: compressed
  sourcemap: never

exclude:
  - assets/styles/
  - docs/THEME-README.md
  - docs/LICENSE

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

paginate: 20
paginate_path: "/writing/page:num/"

navigation:
  - text: "About"
    url: "/about"
  - text: "Research"
    url: "/research"
  - text: "Writing"
    url: "/writing"
  - text: "Contact"
    url: "/contact"
